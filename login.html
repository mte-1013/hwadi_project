<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <a href="index.html"><span>돌아가기</span></a>
    <h1 id="login">로그인</h1>
    <div id="container">
        <div id="c1">
            <label for="username">아이디:</label>
            <input type="text" id="username" placeholder="아이디" class="input-login">
        </div>
        <div id="c2">
            <label for="password">비밀번호:</label>
            <input type="password" id="password" placeholder="비밀번호" class="input-login">
        </div>
        <div id="c3">
            <input type="checkbox" id="gaeyack">
            <label for="gaeyack">이 사이트를 만든 제작자에게 매달 10억을 후원 할 것을 동의합니다.</label>
        </div>
        <button type="submit" id="login-btn">로그인</button>
    </div>
</body>
</html>
